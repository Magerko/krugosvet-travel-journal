# docker-compose: два сервиса — MySQL и Flask-приложение.
# Запуск:
#   docker compose up --build
# Остановка с удалением данных БД:
#   docker compose down -v
#
# После запуска сайт доступен на http://localhost:5000
# MySQL смотрит наружу на 3307 (чтобы не конфликтовать с локальной MySQL, если она стоит).

services:
  db:
    image: mysql:8.4
    container_name: krugosvet-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: krugosvet
      MYSQL_DATABASE: krugosvet
      MYSQL_USER: krugosvet
      MYSQL_PASSWORD: krugosvet
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pkrugosvet"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krugosvet-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: change-me-in-production
      DB_BACKEND: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: krugosvet
      DB_PASSWORD: krugosvet
      DB_NAME: krugosvet
      APP_MODE: dev   # поменять на "prod" — поднимется gunicorn вместо встроенного flask
    ports:
      - "5000:5000"

volumes:
  mysql_data:
